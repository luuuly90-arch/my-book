<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تبرع لفهد</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: "Tahoma", sans-serif;
            background: #000;
            color: white;
        }

        /* زر التبرع فوق يمين */
        .donate-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #ffcc00;
            color: #000;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 0 10px #ffcc00;
        }

        /* النجوم */
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            animation: fall linear infinite;
            opacity: 0.8;
        }

        @keyframes fall {
            0% { transform: translateY(-10px); opacity: 1; }
            100% { transform: translateY(100vh); opacity: 0; }
        }

        /* صندوق التبرع */
        .box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 20, 20, 0.8);
            padding: 30px;
            border-radius: 12px;
            width: 300px;
            text-align: center;
            box-shadow: 0 0 20px #444;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: none;
            font-size: 16px;
        }

        .send-btn {
            width: 100%;
            padding: 12px;
            background: #00ffcc;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 10px #00ffcc;
        }

        .msg {
            margin-top: 15px;
            font-size: 18px;
            color: #00ffcc;
            display: none;
        }
    </style>
</head>
<body>

    <!-- زر التبرع -->
    <a class="donate-btn">تبرع الآن</a>

    <!-- صندوق التبرع -->
    <div class="box">
        <h2>تبرع لفهد</h2>
        <input type="text" id="name" placeholder="اسمك">
        <input type="number" id="amount" placeholder="المبلغ">
        <button class="send-btn" onclick="send()">إرسال</button>
        <div class="msg" id="msg">شكراً على دعمك لفهد!</div>
    </div>

    <!-- توليد النجوم -->
    <script>
        function createStars() {
            for (let i = 0; i < 120; i++) {
                let star = document.createElement("div");
                star.classList.add("star");
                star.style.left = Math.random() * 100 + "vw";
                star.style.animationDuration = (2 + Math.random() * 4) + "s";
                star.style.opacity = Math.random();
                document.body.appendChild(star);
            }
        }
        createStars();

        function send() {
            document.getElementById("msg").style.display = "block";
        }
    </script>

</body>
</html>
