<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>إنشاء حساب</title>
<style>
body { background:#111; color:white; font-family:Arial; text-align:center; padding-top:80px; }
input { width:260px; padding:10px; margin:10px; border-radius:8px; border:none; }
button { padding:12px 25px; background:#00aaff; border:none; border-radius:10px; color:white; font-size:18px; cursor:pointer; }
a { color:#00ffcc; text-decoration:none; }
</style>
</head>
<body>

<h2>إنشاء حساب جديد</h2>

<input id="user" placeholder="اسم المستخدم">
<br>
<input id="pass" type="password" placeholder="كلمة المرور">
<br>
<button onclick="signup()">إنشاء حساب</button>

<p id="msg"></p>

<p>عندك حساب؟ <a href="login.html">تسجيل دخول</a></p>

<script>
function signup() {
    let u = user.value.trim();
    let p = pass.value.trim();

    if(u==="" || p==="") {
        msg.innerText = "املأ جميع الحقول";
        return;
    }

    localStorage.setItem("username", u);
    localStorage.setItem("password", p);
    msg.innerText = "تم إنشاء الحساب بنجاح! يمكنك الآن تسجيل الدخول.";
}
</script>

</body>
</html>
